<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="description" content="Vachtag — outil de gestion de bétail pour l'agriculteur sur le terrain." />
  <title>Vachtag — Gestion du bétail</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Personnalisation rapide de la palette Tailwind (vert agricole)
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:  '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#166534',
              900: '#14532d',
            },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Police Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles personnalisés -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen">

  <!-- =========================================================
       Conteneur principal de l'application (largeur mobile)
       ========================================================= -->
  <div id="app" class="mx-auto max-w-[480px] min-h-screen flex flex-col bg-white shadow-sm relative">

    <!-- =====================================================
         VUE — Tableau de bord (vue par défaut en mode dev)
         ===================================================== -->
    <section id="vue-dashboard" class="view flex-1 flex-col">
      <!-- En-tête -->
      <header class="px-5 pt-6 pb-4 flex items-center justify-between">
        <div>
          <p class="text-xs uppercase tracking-wider text-gray-400 font-semibold">Bonjour</p>
          <h2 id="user-name" class="text-xl font-bold text-gray-900 truncate max-w-[260px]">—</h2>
        </div>
        <button id="btn-logout" type="button" aria-label="Se déconnecter"
          class="w-11 h-11 flex items-center justify-center rounded-full text-gray-500 hover:bg-gray-100 active:bg-gray-200 tap-target">
          <!-- Icône déconnexion -->
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </button>
      </header>

      <!-- Cartes indicateurs -->
      <div class="px-5 grid grid-cols-2 gap-3 mb-5">
        <!-- Total -->
        <div class="bg-gradient-to-br from-primary-600 to-primary-700 text-white rounded-2xl p-4 shadow-md shadow-primary-600/20">
          <p class="text-xs uppercase font-semibold tracking-wider opacity-80">Total</p>
          <p id="stat-total" class="text-4xl font-extrabold mt-2">0</p>
          <p class="text-xs mt-1 opacity-90">bête(s) enregistrée(s)</p>
        </div>
        <!-- En traitement -->
        <div class="bg-gradient-to-br from-orange-500 to-red-600 text-white rounded-2xl p-4 shadow-md shadow-orange-500/20">
          <p class="text-xs uppercase font-semibold tracking-wider opacity-80">En traitement</p>
          <p id="stat-traitement" class="text-4xl font-extrabold mt-2">0</p>
          <p class="text-xs mt-1 opacity-90">vente interdite</p>
        </div>
      </div>

      <!-- Boutons d'action -->
      <div class="px-5 mt-2 space-y-3 pb-8">
        <button id="btn-go-form" type="button"
          class="w-full flex items-center justify-center gap-2 bg-primary-600 hover:bg-primary-700 active:bg-primary-800 text-white font-semibold text-lg py-5 rounded-2xl shadow-md shadow-primary-600/20 transition tap-target">
          <span aria-hidden="true">➕</span>
          <span>Ajouter une bête</span>
        </button>
        <button id="btn-go-list" type="button"
          class="w-full flex items-center justify-center gap-2 bg-white border-2 border-gray-200 hover:bg-gray-50 active:bg-gray-100 text-gray-800 font-semibold text-lg py-5 rounded-2xl transition tap-target">
          <span aria-hidden="true">📋</span>
          <span>Voir la liste</span>
        </button>
      </div>
    </section>

    <!-- =====================================================
         VUE 3 — Formulaire d'ajout
         ===================================================== -->
    <section id="vue-form" class="view flex-1 flex-col hidden">
      <header class="px-5 pt-6 pb-4 flex items-center gap-3">
        <button class="btn-back w-11 h-11 flex items-center justify-center rounded-full text-gray-700 hover:bg-gray-100 active:bg-gray-200 tap-target" data-target="vue-dashboard" aria-label="Retour">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <h2 class="text-xl font-bold text-gray-900">Ajouter une bête</h2>
      </header>

      <form id="form-betail" class="px-5 pb-10 space-y-5" novalidate>
        <!-- Numéro de boucle -->
        <div>
          <label for="input-boucle" class="block text-sm font-semibold text-gray-700 mb-2">
            Numéro de boucle <span class="text-red-500">*</span>
          </label>
          <input id="input-boucle" name="numeroBoucle" type="text" required
            inputmode="text" autocomplete="off"
            placeholder="Ex. FR1234567890"
            class="w-full px-4 py-4 text-base border-2 border-gray-200 rounded-2xl focus:border-primary-600 focus:outline-none transition" />
        </div>

        <!-- Nom -->
        <div>
          <label for="input-nom" class="block text-sm font-semibold text-gray-700 mb-2">
            Nom / surnom <span class="text-gray-400 font-normal">(facultatif)</span>
          </label>
          <input id="input-nom" name="nom" type="text" autocomplete="off"
            placeholder="Ex. Marguerite"
            class="w-full px-4 py-4 text-base border-2 border-gray-200 rounded-2xl focus:border-primary-600 focus:outline-none transition" />
        </div>

        <!-- Date de naissance -->
        <div>
          <label for="input-naissance" class="block text-sm font-semibold text-gray-700 mb-2">
            Date de naissance
          </label>
          <input id="input-naissance" name="dateNaissance" type="date"
            class="w-full px-4 py-4 text-base border-2 border-gray-200 rounded-2xl focus:border-primary-600 focus:outline-none transition" />
        </div>

        <!-- État de santé (toggle) -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">État de santé</label>
          <div class="grid grid-cols-2 gap-2 p-1 bg-gray-100 rounded-2xl" role="group" aria-label="État de santé">
            <button type="button" class="toggle-sante toggle-active py-4 rounded-xl font-semibold transition tap-target" data-value="Sain">
              ✅ Sain
            </button>
            <button type="button" class="toggle-sante py-4 rounded-xl font-semibold transition tap-target" data-value="En traitement">
              ⚠️ En traitement
            </button>
          </div>
          <input type="hidden" id="input-sante" name="etatSante" value="Sain" />
        </div>

        <!-- Erreur formulaire -->
        <div id="form-error" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm"></div>

        <!-- Bouton submit -->
        <button id="btn-submit" type="submit"
          class="w-full flex items-center justify-center gap-2 bg-primary-600 hover:bg-primary-700 active:bg-primary-800 text-white font-semibold text-lg py-5 rounded-2xl shadow-md shadow-primary-600/20 transition tap-target disabled:opacity-60 disabled:cursor-not-allowed">
          <span id="btn-submit-label">Enregistrer</span>
          <span id="btn-submit-spinner" class="hidden spinner"></span>
        </button>
      </form>
    </section>

    <!-- =====================================================
         VUE 4 — Liste & recherche
         ===================================================== -->
    <section id="vue-list" class="view flex-1 flex-col hidden">
      <header class="px-5 pt-6 pb-3 flex items-center gap-3">
        <button class="btn-back w-11 h-11 flex items-center justify-center rounded-full text-gray-700 hover:bg-gray-100 active:bg-gray-200 tap-target" data-target="vue-dashboard" aria-label="Retour">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <h2 class="text-xl font-bold text-gray-900">Mon bétail</h2>
      </header>

      <!-- Barre de recherche -->
      <div class="px-5 pb-4">
        <div class="relative">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z"/>
          </svg>
          <input id="input-recherche" type="search" autocomplete="off"
            placeholder="Rechercher par nom ou numéro de boucle…"
            class="w-full pl-11 pr-4 py-4 text-base border-2 border-gray-200 rounded-2xl focus:border-primary-600 focus:outline-none transition" />
        </div>
      </div>

      <!-- Liste -->
      <div id="liste-betail" class="px-5 pb-10 space-y-3"></div>

      <!-- État vide -->
      <div id="liste-vide" class="hidden flex-1 flex flex-col items-center justify-center text-center px-6 pb-20">
        <div class="text-6xl mb-4" aria-hidden="true">🐄</div>
        <p class="text-gray-500 font-medium">Aucune bête enregistrée</p>
        <p class="text-gray-400 text-sm mt-1">Commencez par en ajouter une depuis le tableau de bord.</p>
      </div>

      <!-- Aucun résultat -->
      <div id="liste-aucun-resultat" class="hidden flex-1 flex flex-col items-center justify-center text-center px-6 pb-20">
        <div class="text-6xl mb-4" aria-hidden="true">🔎</div>
        <p class="text-gray-500 font-medium">Aucun résultat</p>
        <p class="text-gray-400 text-sm mt-1">Essayez un autre nom ou numéro de boucle.</p>
      </div>
    </section>

    <!-- =====================================================
         Overlay de chargement global
         ===================================================== -->
    <div id="loader-global" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-50">
      <div class="spinner spinner-lg"></div>
    </div>

    <!-- =====================================================
         Toast de notification
         ===================================================== -->
    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  </div>

  <!-- Point d'entrée JS (module ES) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
